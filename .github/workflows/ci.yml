# Simulation (Icarus), lint (Verilator), formal (SymbiYosys via OSS CAD Suite).
name: CI

on: [push, pull_request]

env:
  # Pin OSS CAD Suite for reproducible formal CI; bump when upgrading tools.
  OSS_CAD_SUITE_VERSION: "2026-04-13"

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Simulation (default + heavy stress)
        working-directory: test
        run: make clean && make && make stress

  verilator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Lint RTL (no testbench)
        run: |
          verilator -Isrc --lint-only -Wall -top-module cxl_ucie_bridge \
            src/sync_fifo.v src/cxl_ucie_bridge.v

  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ env.OSS_CAD_SUITE_VERSION }}

      - name: SymbiYosys formal (bmc + cover, sync_fifo)
        working-directory: formal
        run: |
          set -euo pipefail
          test -r "${GITHUB_WORKSPACE}/src/sync_fifo.v"
          python3 <<'PY'
          import os
          from pathlib import Path
          root = Path(os.environ["GITHUB_WORKSPACE"])
          rtl = root / "src" / "sync_fifo.v"
          assert rtl.is_file(), rtl
          src = root / "formal" / "sync_fifo.sby"
          out = root / "formal" / "sync_fifo_ci.sby"
          old = "read_verilog -sv -DFORMAL ../../../src/sync_fifo.v"
          new = f"read_verilog -sv -DFORMAL {rtl}"
          text = src.read_text()
          if old not in text:
              raise SystemExit(f"expected snippet not in {src}: {old!r}")
          out.write_text(text.replace(old, new, 1))
          print("wrote", out)
          print(new)
          PY
          sby -f sync_fifo_ci.sby

      - name: SymbiYosys formal (bmc + cover, cxl_ucie_bridge)
        working-directory: formal
        run: |
          set -euo pipefail
          test -r "${GITHUB_WORKSPACE}/src/cxl_ucie_bridge.v"
          python3 <<'PY'
          import os
          from pathlib import Path
          root = Path(os.environ["GITHUB_WORKSPACE"])
          assert (root / "src" / "cxl_ucie_bridge.v").is_file()
          src = root / "formal" / "cxl_ucie_bridge.sby"
          out = root / "formal" / "cxl_ucie_bridge_ci.sby"
          text = src.read_text()
          new = text.replace("../../../src", str(root / "src"))
          assert new != text, "no path substitution made in cxl_ucie_bridge.sby"
          out.write_text(new)
          print("wrote", out)
          PY
          sby -f cxl_ucie_bridge_ci.sby
