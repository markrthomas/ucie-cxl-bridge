# CI: lint (Verilator) + simulation (Icarus) + formal (SymbiYosys via OSS CAD Suite).
# Standard job layout: regress (fast gate) → formal (comprehensive).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pin OSS CAD Suite for reproducible formal CI; bump when upgrading tools.
  OSS_CAD_SUITE_VERSION: "2026-04-13"

jobs:
  regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator

      - name: Lint (Verilator) + directed simulation + stress (make regress + stress)
        run: make regress && make stress

  formal:
    needs: regress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ env.OSS_CAD_SUITE_VERSION }}

      - name: SymbiYosys formal (bmc + cover, sync_fifo)
        working-directory: verification/formal
        run: |
          set -euo pipefail
          test -r "${GITHUB_WORKSPACE}/src/sync_fifo.v"
          python3 <<'PY'
          import os
          from pathlib import Path
          root = Path(os.environ["GITHUB_WORKSPACE"])
          rtl = root / "src" / "sync_fifo.v"
          assert rtl.is_file(), rtl
          src = root / "verification" / "formal" / "sync_fifo.sby"
          out = root / "verification" / "formal" / "sync_fifo_ci.sby"
          old = "../../../../src/sync_fifo.v"
          new = f"{rtl}"
          text = src.read_text()
          if old not in text:
              raise SystemExit(f"expected snippet not in {src}: {old!r}")
          out.write_text(text.replace(old, new, 1))
          print("wrote", out)
          print(new)
          PY
          sby -f sync_fifo_ci.sby

      - name: SymbiYosys formal (bmc + cover, cxl_ucie_bridge)
        working-directory: verification/formal
        run: |
          set -euo pipefail
          test -r "${GITHUB_WORKSPACE}/src/cxl_ucie_bridge.v"
          python3 <<'PY'
          import os
          from pathlib import Path
          root = Path(os.environ["GITHUB_WORKSPACE"])
          assert (root / "src" / "cxl_ucie_bridge.v").is_file()
          src = root / "verification" / "formal" / "cxl_ucie_bridge.sby"
          out = root / "verification" / "formal" / "cxl_ucie_bridge_ci.sby"
          text = src.read_text()
          new = text.replace("../../../../src", str(root / "src"))
          assert new != text, "no path substitution made in cxl_ucie_bridge.sby"
          out.write_text(new)
          print("wrote", out)
          PY
          sby -f cxl_ucie_bridge_ci.sby

      - name: SymbiYosys formal (bmc + cover, reset_drain)
        working-directory: verification/formal
        run: |
          set -euo pipefail
          test -r "${GITHUB_WORKSPACE}/src/reset_drain.v"
          python3 <<'PY'
          import os
          from pathlib import Path
          root = Path(os.environ["GITHUB_WORKSPACE"])
          assert (root / "src" / "reset_drain.v").is_file()
          src = root / "verification" / "formal" / "reset_drain.sby"
          out = root / "verification" / "formal" / "reset_drain_ci.sby"
          text = src.read_text()
          new = text.replace("../../../../src", str(root / "src"))
          assert new != text, "no path substitution made in reset_drain.sby"
          out.write_text(new)
          print("wrote", out)
          PY
          sby -f reset_drain_ci.sby
